name: bookpub

on:
  push:
    paths:
      - "plugins/pstuart-publishing/skills/book-publisher/**"
  pull_request:
    paths:
      - "plugins/pstuart-publishing/skills/book-publisher/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: plugins/pstuart-publishing/skills/book-publisher

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # poppler-utils -> pdffonts/pdftotext/pdfinfo (QA gate); ghostscript -> CMYK
      # preflight; default-jre -> epubcheck. The bundled EB Garamond means NO
      # macOS system font is needed — this job proves the engine is portable.
      - name: System tools
        run: sudo apt-get update && sudo apt-get install -y poppler-utils ghostscript default-jre unzip

      - name: Install epubcheck
        run: |
          ver=5.1.0
          curl -fsSL -o /tmp/ec.zip "https://github.com/w3c/epubcheck/releases/download/v${ver}/epubcheck-${ver}.zip"
          sudo unzip -q /tmp/ec.zip -d /opt
          printf '#!/usr/bin/env bash\nexec java -jar /opt/epubcheck-%s/epubcheck.jar "$@"\n' "$ver" | sudo tee /usr/local/bin/epubcheck >/dev/null
          sudo chmod +x /usr/local/bin/epubcheck
          epubcheck --version

      - name: Install bookpub
        run: pip install -e ".[test]"

      - name: Test suite
        run: python3 -m pytest -q
